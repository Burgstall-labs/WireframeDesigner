<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#1a1a1a" rx="32"/>
  
  <!-- 3D Wireframe Cube -->
  <g transform="translate(128, 128)" stroke="#4CAF50" stroke-width="3" fill="none">
    <!-- Back face -->
    <rect x="-40" y="-40" width="80" height="80" opacity="0.6"/>
    
    <!-- Front face -->
    <rect x="-60" y="-20" width="80" height="80" opacity="1"/>
    
    <!-- Connecting lines for 3D effect -->
    <line x1="-40" y1="-40" x2="-60" y2="-20" opacity="0.8"/>
    <line x1="40" y1="-40" x2="20" y2="-20" opacity="0.8"/>
    <line x1="40" y1="40" x2="20" y2="60" opacity="0.8"/>
    <line x1="-40" y1="40" x2="-60" y2="60" opacity="0.8"/>
  </g>
  
  <!-- Animation dots to suggest movement -->
  <g transform="translate(128, 50)" fill="#66BB6A">
    <circle r="2" cx="-10" cy="0" opacity="0.6"/>
    <circle r="2" cx="0" cy="0" opacity="0.8"/>
    <circle r="2" cx="10" cy="0" opacity="1"/>
  </g>
  
  <!-- Title text -->
  <text x="128" y="220" text-anchor="middle" fill="#CCCCCC" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    WIREFRAME
  </text>
  <text x="128" y="240" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="12">
    DESIGNER
  </text>
</svg> 